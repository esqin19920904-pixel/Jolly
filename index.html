    if ("serviceWorker" in navigator) {

          console.log("[JOLLY] Service Worker qeydiyyatdan keçdi — offline dəstək aktivdir");
          reg.addEventListener("updatefound", () => {
            const nw = reg.installing;
            if (!nw) return;
            nw.addEventListener("statechange", () => {
              if (nw.state === "installed" && navigator.serviceWorker.controller) {
                if (typeof Toast !== "undefined") Toast.info("Yeni versiya mövcuddur — yeniləmək üçün bağlayıb açın");
              }
            });
          });
        }).catch((e) => {
          console.warn("[JOLLY] Service Worker qeydiyyata alınmadı:", e);
        });
      });
    }

<!-- ═══════════════════════════════════════════════════════
     JOLLY Auth Overlay — Sadələşdirilmiş (v2)
     Rol seçimi YOXDUR — PIN yazılan kimi sistem özü tanıyır:
     Admin PIN-i uyğun gələrsə Admin, JollyUsers-dən biri uyğun
     gələrsə o işçi kimi daxil edir.
     ═══════════════════════════════════════════════════════ -->
<div id="jolly-auth-overlay" style="display:none; position:fixed; inset:0; z-index:999999; background:#06070d; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
<style>
  #jolly-auth-overlay * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  #jolly-auth-overlay { display:flex; align-items:center; justify-content:center; padding:20px; }
  .jl-card { width:100%; max-width:360px; text-align:center; }
  .jl-logo { font-size:1.6rem; font-weight:700; letter-spacing:4px; background:linear-gradient(135deg,#00d4ff,#a855f7); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:6px; }
  .jl-sub { font-size:0.85rem; color:rgba(255,255,255,0.45); margin-bottom:32px; }
  .jl-dots { display:flex; justify-content:center; gap:18px; margin-bottom:36px; }
  .jl-dot { width:14px; height:14px; border-radius:50%; border:2px solid rgba(255,255,255,0.25); transition:all 0.2s; }
  .jl-dot.fill { background:#00d4ff; border-color:#00d4ff; box-shadow:0 0 12px rgba(0,212,255,0.5); }
  .jl-dot.bad { background:#ef4444; border-color:#ef4444; box-shadow:0 0 12px rgba(239,68,68,0.5); }
  .jl-dot.good { background:#22c55e; border-color:#22c55e; box-shadow:0 0 12px rgba(34,197,94,0.5); }
  .jl-pad { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; max-width:260px; margin:0 auto; }
  .jl-key { aspect-ratio:1; border-radius:50%; border:1.5px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04); color:#fff; font-size:1.3rem; font-weight:500; display:flex; align-items:center; justify-content:center; }
  .jl-key:active { background:rgba(0,212,255,0.15); transform:scale(0.92); }
  .jl-msg { margin-top:22px; font-size:0.8rem; color:rgba(255,255,255,0.4); min-height:18px; }
  .jl-msg.err { color:#ef4444; }
  .jl-ok { display:none; text-align:center; }
  .jl-ok.on { display:block; }
  .jl-ok-name { font-size:1.2rem; font-weight:600; margin-top:14px; color:#22c55e; }
</style>

  <div class="jl-card" id="jl-lock-screen">

    </div>

      <button class="jl-key" onclick="jlPress('4')">4</button>
      <button class="jl-key" onclick="jlPress('5')">5</button>
      <button class="jl-key" onclick="jlPress('6')">6</button>
      <button class="jl-key" onclick="jlPress('7')">7</button>
      <button class="jl-key" onclick="jlPress('8')">8</button>
      <button class="jl-key" onclick="jlPress('9')">9</button>
      <button class="jl-key" onclick="jlBack()">⌫</button>
      <button class="jl-key" onclick="jlPress('0')">0</button>
      <button class="jl-key" onclick="jlClear()">C</button>
    </div>
    <div class="jl-msg" id="jl-msg"></div>
  </div>

  <div class="jl-ok" id="jl-ok-screen">
    <div style="font-size:2.5rem;">✅</div>
    <div class="jl-ok-name" id="jl-ok-name"></div>
  </div>

<script>
(function(){
  let _cfg = { pinHash:null, viewerEnabled:false, viewerPinHash:null };
  let _setSession = null;
  let pin = '';

  function jlHash(s){
    let h = 0x811c9dc5;
    for (let i=0;i<s.length;i++){ h ^= s.charCodeAt(i); h = (h*0x01000193)>>>0; }
    return h.toString(16).padStart(8,'0');
  }

  window._jaSetCfg = function(cfg, setSession){
    _cfg = cfg;
    _setSession = setSession;
  };

  window.jollyAuthShow = function(){
    pin=''; jlRenderDots();
    document.getElementById('jl-lock-screen').style.display='block';
    document.getElementById('jl-ok-screen').classList.remove('on');
    document.getElementById('jl-msg').textContent='';
    document.getElementById('jl-msg').className='jl-msg';
    document.getElementById('jolly-auth-overlay').style.display='block';
  };

  window.jollyAuthHide = function(){
    document.getElementById('jolly-auth-overlay').style.display='none';
  };

  function jlRenderDots(){
    for(let i=0;i<4;i++){
      const d=document.getElementById('jl-d'+i);
      if(!d) continue;
      d.classList.remove('fill','bad','good');
      if(i<pin.length) d.classList.add('fill');
    }
  }

  window.jlPress = function(digit){
    if(pin.length>=4) return;
    pin += digit;
    jlRenderDots();
    if(pin.length===4) setTimeout(jlCheck,200);
  };
  window.jlBack = function(){ pin = pin.slice(0,-1); jlRenderDots(); };
  window.jlClear = function(){ pin=''; jlRenderDots(); };

  function jlCheck(){
    const h = jlHash(pin);
    const msg = document.getElementById('jl-msg');
    let role=null, matchedUser=null;

    if (h === _cfg.pinHash) {
      role = 'admin';
    } else if (window.JollyUsers) {
      matchedUser = JollyUsers.verifyPin(pin);
      if (matchedUser) role = 'user';
    }
    if (!role && _cfg.viewerEnabled && h === _cfg.viewerPinHash) role = 'user';

    if (role) {
      for(let i=0;i<4;i++) document.getElementById('jl-d'+i).classList.add('good');
      if (_setSession) _setSession(role, matchedUser);
      const name = role==='admin' ? 'Administrator' : (matchedUser ? matchedUser.name : 'User');
      document.getElementById('jl-ok-name').textContent = name + ' olaraq daxil oldunuz';
      setTimeout(()=>{
        document.getElementById('jl-lock-screen').style.display='none';
        document.getElementById('jl-ok-screen').classList.add('on');
        setTimeout(()=>{ jollyAuthHide(); }, 1200);
      }, 300);
    } else {
      for(let i=0;i<4;i++) document.getElementById('jl-d'+i).classList.add('bad');
      msg.textContent = 'Yanlış PIN, yenidən cəhd edin';
      msg.className = 'jl-msg err';
      setTimeout(()=>{ pin=''; jlRenderDots(); }, 500);
    }
  }

  document.addEventListener('keydown', e=>{
    if(document.getElementById('jolly-auth-overlay').style.display==='none') return;
    if(e.key>='0' && e.key<='9') jlPress(e.key);
    if(e.key==='Backspace') jlBack();
  });
})();
</script>
